worker_processes 1;
pid /srv/dadatun-demo/nginx/nginx.pid;
error_log /srv/dadatun-demo/nginx/error.log;

events {
	worker_connections 512;
}

http {
	include /etc/nginx/mime.types;
	default_type application/octet-stream;
	access_log /srv/dadatun-demo/nginx/access.log;
	sendfile on;

	server {
		listen 8443 ssl http2;
		listen [::]:8443 ssl http2;
		server_name dadatun.online www.dadatun.online;

		ssl_certificate /etc/nginx/certs/cf-origin.pem;
		ssl_certificate_key /etc/nginx/certs/cf-origin.key;
		ssl_protocols TLSv1.2 TLSv1.3;

		location / {
			proxy_pass http://127.0.0.1:8081;
			proxy_http_version 1.1;
			proxy_set_header Host $host;
			proxy_set_header X-Real-IP $remote_addr;
			proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
			proxy_set_header X-Forwarded-Proto https;
		}
	}
}
