- id: WQ-DO-GROWOUT-001
  source_id: SRC-001
  stage: grow_out
  parameter: dissolved_oxygen
  claim: "保持水体溶解氧在 5 mg/L 以上。"
  value: 5
  unit: mg/L
  condition: "成虾池塘养殖期"
  action_candidates:
    - aeration
    - add_fresh_water
  evidence_level: A
  can_enter_code: true
  code_policy: configurable_threshold
  uncertainty:
    - "边界值等于阈值时的风险等级需要在系统策略中明确"
  test_idea:
    - "DO 低于 5 mg/L 时输出 WARNING 或 DANGER"
    - "DO 为负数时输出 SENSOR_INVALID"

