- id: WQ-PATROL-GROWOUT-001
  source_id: SRC-001
  stage: grow_out
  parameter: patrol_frequency
  claim: "坚持每天早、中、晚各巡塘一次。遇闷热或雷阵雨天气，夜间和清晨应增加巡塘次数。"
  value: 3
  unit: 次/天
  condition: "常规天气"
  action_candidates:
    - log_patrol
    - increase_patrol
  evidence_level: A
  can_enter_code: true
  code_policy: configurable_threshold
  uncertainty:
    - "“增加次数”的具体频率取决于农户的执行力，系统只能做任务下发"
  test_idea:
    - "生成日常巡塘待办任务 3 次/天"
    - "接入天气 API，雷阵雨天气自动生成夜间附加巡塘任务"

