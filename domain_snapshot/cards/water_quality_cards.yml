- id: WQ-LEVEL-GROWOUT-001
  source_id: SRC-001
  stage: grow_out
  parameter: water_level
  claim: "水温升高期间加注新水，保持水位在 1.2 m～1.5 m；越冬期保持水深 1.5 m 左右。"
  value: 1.2-1.5
  unit: m
  condition: "成虾养殖中后期或越冬期"
  action_candidates:
    - add_fresh_water
  evidence_level: A
  can_enter_code: true
  code_policy: configurable_threshold
  uncertainty:
    - "放养前初级水位标准为 60cm-80cm，需根据日历和养殖阶段切换阈值"
  test_idea:
    - "高温期水位 < 1.2m 触发缺水告警"
    - "越冬期检查水位目标设定为 1.5m"

