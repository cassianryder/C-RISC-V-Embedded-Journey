- id: WQ-TRANS-GROWOUT-001
  source_id: SRC-001
  stage: grow_out
  parameter: transparency
  claim: "透明度以 30 cm 左右为宜。"
  value: 30
  unit: cm
  condition: "成虾池塘养殖期"
  action_candidates:
    - fertilize_water
    - add_fresh_water
  evidence_level: A
  can_enter_code: true
  code_policy: configurable_threshold
  uncertainty:
    - "“左右”一词属模糊语义，建议代码中转化为合理的容差范围（如 25-35cm）"
  test_idea:
    - "透明度远低于 30cm 判定为过浓，远高于 30cm 判定为偏清"

